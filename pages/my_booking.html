<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예매 내역 - BIT CINEMA</title>
    <link rel="stylesheet" href="../css/my_booking.css">
</head>
<body>
    <header class="top-nav">
        <a href="../index.html"><img src="../images/logo.jpg" alt="Logo" class="logo"></a>
        <a href="movies_all.html">전체 이용가</a>
        <a href="movies_15.html">15세 이용가</a>
        <a href="movies_19.html">19세 이용가</a>
        <a href="login.html" id="nav-login">로그인</a>
        <a href="my_booking.html" id="nav-my-booking" class="active">예매한 영화</a>
        <a href="#" id="nav-logout" class="nav-hidden">로그아웃</a>
    </header>

    <h1 class="page-title">예매한 영화</h1>
    <p class="page-subtitle">나의 예매 내역을 확인하세요</p>

    <main class="booking-page">
        <div id="booking-list"></div>
        <div class="page-actions">
            <a href="../index.html" class="btn-back">메인으로 돌아가기</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 비트 시네마 모둠 과제. All rights reserved.</p>
    </footer>

    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const bookingListDiv = document.getElementById('booking-list');
            const myBookings = [...getMyBookings()].reverse();

            if (myBookings.length === 0) {
                bookingListDiv.innerHTML = '<p class="empty-msg">예매된 내역이 없습니다.<br>영화를 예매해 보세요!</p>';
                return;
            }

            myBookings.forEach((booking, index) => {
                const card = document.createElement('article');
                card.className = 'booking-card';
                const seatLabel = booking.seats && booking.seats.length
                    ? booking.seats.map(s => (s + 1) + '번').join(', ')
                    : '-';

                card.innerHTML = `
                    <div class="booking-card-header">
                        <h3>${booking.movie || '영화'}</h3>
                        <span class="booking-number">#${index + 1001}</span>
                    </div>
                    <dl class="booking-details">
                        <div class="booking-row">
                            <dt>상영일</dt>
                            <dd>${booking.bookingDate || '-'}</dd>
                        </div>
                        <div class="booking-row">
                            <dt>예매 일시</dt>
                            <dd>${booking.date}</dd>
                        </div>
                        <div class="booking-row">
                            <dt>좌석</dt>
                            <dd>${seatLabel}</dd>
                        </div>
                        <div class="booking-row">
                            <dt>좌석 수</dt>
                            <dd>${booking.seatCount || (booking.seats ? booking.seats.length : 0)}석</dd>
                        </div>
                        <div class="booking-row">
                            <dt>결제 금액</dt>
                            <dd class="price">${booking.totalPrice.toLocaleString()}원</dd>
                        </div>
                    </dl>
                `;

                bookingListDiv.appendChild(card);
            });
        });
    </script>
</body>
</html>
