<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/booking.css">
</head>
<body>
    <ul class="showcase">
        <li>
            <div class="seat"></div>
            <small>선택 가능</small>
        </li>
        <li>
            <div class="seat selected"></div>
            <small>선택</small>
        </li>
        <li>
            <div class="seat occupied"></div>
            <small>예매 완료</small>
        </li>
    </ul>
    <div class="screen"></div>

    <div class="date-selection" style="text-align: center; margin: 20px 0;">
        <label for="booking-date" style="color: white; font-size: 1.2rem; margin-right: 10px;">예매 날짜 선택:</label>
        <input type="date" id="booking-date" style="padding: 5px; font-size: 1rem; border-radius: 5px; border: none;">
    </div>

    <div class="row-container">
        <div class="row">
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat occupied"></div>
            <div class="seat occupied"></div>
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>
        </div>
        <div class="row">
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat occupied"></div>
            <div class="seat occupied"></div>
        </div>
        <div class="row">
            <div class="seat"></div>
                <div class="seat occupied"></div>
                <div class="seat"></div>
                <div class="seat"></div>
                <div class="seat"></div>
                <div class="seat"></div>
                <div class="seat"></div>
                <div class="seat"></div>
            </div>
            <div class="row">
                <div class="seat"></div>
                <div class="seat"></div>
                <div class="seat"></div>
                <div class="seat"></div>
                <div class="seat"></div>
                <div class="seat"></div>
                <div class="seat"></div>
                <div class="seat"></div>
            </div>
            <div class="row">
                <div class="seat"></div>
                <div class="seat"></div>
                <div class="seat"></div>
                <div class="seat"></div>
                <div class="seat occupied"></div>
                <div class="seat occupied"></div>
                <div class="seat"></div>
                <div class="seat"></div>
            </div>
            <div class="row">
                <div class="seat"></div>
                <div class="seat"></div>
                <div class="seat"></div>
                <div class="seat"></div>
                <div class="seat"></div>
                <div class="seat"></div>
                <div class="seat"></div>
                <div class="seat"></div>
            </div>
        </div>
        <p class="text">
            <span id="count">0</span>개의 좌석을 선택하셨습니다. (좌석당 15,000원) 총 금액은 <span id="total">0</span>원 입니다.
        </p>

        <button onclick="bookSeats()">예매하기</button>
        <p id="booking-message" class="message"></p>
    </div>
    <script src="../js/auth.js"></script>
    <script src="../js/movie_booking_script.js"></script>
</body>
</html>
